<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b18d6"/>
      <stop offset="55%" stop-color="#7415d0"/>
      <stop offset="100%" stop-color="#6a12c7"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcb33"/>
      <stop offset="45%" stop-color="#ffb31f"/>
      <stop offset="100%" stop-color="#ff8d00"/>
    </linearGradient>

    <radialGradient id="sphereGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#52d2ff"/>
      <stop offset="55%" stop-color="#1c94eb"/>
      <stop offset="100%" stop-color="#0073d8"/>
    </radialGradient>

    <linearGradient id="hGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc93a"/>
      <stop offset="100%" stop-color="#ffb118"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2b0054" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <g filter="url(#softShadow)">
    <circle cx="175" cy="500" r="125"
            fill="none"
            stroke="url(#ringGrad)"
            stroke-width="18"
            stroke-linecap="round"
            stroke-dasharray="650 150"
            transform="rotate(-25 175 500)"/>

    <circle cx="175" cy="500" r="72" fill="url(#sphereGrad)"/>
    <circle cx="175" cy="500" r="72" fill="none" stroke="#b9f2ff" stroke-opacity="0.65" stroke-width="2"/>

    <ellipse cx="145" cy="475" rx="28" ry="22" fill="#d6f7ff" opacity="0.45"/>
    <ellipse cx="151" cy="468" rx="14" ry="10" fill="#ffffff" opacity="0.28"/>

    <path d="M175 360
             L181 374
             L195 380
             L181 386
             L175 400
             L169 386
             L155 380
             L169 374 Z"
          fill="#ffe64a"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="335" y="540"
          font-family="Arial, Helvetica, sans-serif"
          font-size="175"
          font-weight="700"
          fill="url(#hGrad)"
          letter-spacing="-3">H</text>

    <text x="460" y="540"
          font-family="Arial, Helvetica, sans-serif"
          font-size="128"
          font-weight="500"
          fill="#ffffff"
          letter-spacing="-2">armonia</text>

    <text x="901" y="540"
          font-family="Arial, Helvetica, sans-serif"
          font-size="128"
          font-weight="500"
          fill="#ffb61d">.</text>
  </g>
</svg>
